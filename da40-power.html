<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DA40 Power</title>
<link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap');

  :root {
    --bg: #0a0c0f;
    --panel: #111318;
    --border: #1e2330;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --green: #39ff6e;
    --dim: #3a4055;
    --text: #c8d0e0;
    --muted: #5a6278;
    --font-mono: 'Share Tech Mono', monospace;
    --font-ui: 'Barlow Condensed', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: env(safe-area-inset-top, 12px) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 12px) env(safe-area-inset-left, 0);
    overflow-x: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }

  .logo {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .logo span { color: var(--accent); }

  .title {
    font-family: var(--font-ui);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #fff;
    text-transform: uppercase;
  }

  .badge {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    padding: 2px 6px;
    letter-spacing: 0.1em;
  }

  main { padding: 14px 14px 20px; max-width: 500px; margin: 0 auto; }

  /* ── Selectors ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }

  .field { display: flex; flex-direction: column; gap: 5px; }

  label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }

  select, input[type=range] {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 18px;
    font-weight: 600;
    padding: 10px 12px;
    appearance: none;
    -webkit-appearance: none;
    border-radius: 0;
    outline: none;
    letter-spacing: 0.04em;
  }

  select:focus { border-color: var(--accent); }

  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    pointer-events: none;
    font-size: 14px;
  }

  /* Altitude slider */
  .alt-display {
    font-family: var(--font-mono);
    font-size: 26px;
    color: var(--accent);
    text-align: center;
    letter-spacing: 0.08em;
    padding: 6px 0 2px;
  }
  .alt-display span { font-size: 12px; color: var(--muted); }

  input[type=range] {
    padding: 0;
    height: 36px;
    border: none;
    background: transparent;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: -10px;
    box-shadow: 0 0 12px rgba(0,212,255,0.5);
  }

  /* Temp stepper */
  .temp-stepper {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 14px;
    border: 1px solid var(--border);
    background: var(--panel);
  }

  .temp-step-btn {
    width: 48px;
    height: 48px;
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 22px;
    font-family: var(--font-mono);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.1s;
  }

  .temp-step-btn:active { background: rgba(0,212,255,0.1); }

  .temp-display {
    flex: 1;
    text-align: center;
  }

  .temp-display .temp-val {
    font-family: var(--font-mono);
    font-size: 26px;
    color: var(--accent2);
    display: block;
    line-height: 1;
  }

  .temp-display .temp-val.neutral { color: var(--text); }
  .temp-display .temp-val.cold { color: #5bc8ff; }

  .temp-display .temp-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    display: block;
    margin-top: 3px;
  }

  /* ── Results ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--dim), transparent);
    margin: 4px 0 16px;
  }

  .result-header {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .result-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 14px 16px;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
  }

  .result-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }

  .result-card.warning::before { background: var(--accent2); }
  .result-card.good::before { background: var(--green); }

  .result-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .result-value {
    font-family: var(--font-mono);
    font-size: 36px;
    color: #fff;
    line-height: 1;
    letter-spacing: 0.04em;
  }

  .result-value .unit {
    font-size: 14px;
    color: var(--muted);
    margin-left: 4px;
  }

  .result-sub {
    font-family: var(--font-ui);
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.03em;
  }

  .result-sub strong { color: var(--text); }

  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

  .result-small {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 12px 14px;
  }

  .result-small .result-value { font-size: 26px; }

  /* note */
  .note {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    line-height: 1.6;
    padding: 10px 12px;
    border-left: 2px solid var(--dim);
    margin-top: 4px;
  }

  .interp-badge {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--accent2);
    border: 1px solid rgba(255,107,53,0.3);
    padding: 1px 5px;
    margin-left: 8px;
    vertical-align: middle;
  }

  /* Recommended band indicator */
  .rec-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 3px 8px;
    margin-top: 8px;
  }

  .rec-badge.recommended {
    color: var(--green);
    border: 1px solid rgba(57,255,110,0.35);
    background: rgba(57,255,110,0.07);
  }

  .rec-badge.not-recommended {
    color: var(--accent2);
    border: 1px solid rgba(255,107,53,0.35);
    background: rgba(255,107,53,0.07);
  }

  .rec-badge::before {
    content: '●';
    font-size: 8px;
  }

  .no-data {
    text-align: center;
    padding: 30px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* Scan line effect */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 9999;
  }
</style>
</head>
<body>

<header>
  <div class="logo">DA 40 · <span>AFM 5-6/5-7</span></div>
  <div class="title">Power</div>
  <div class="badge">IO-360</div>
</header>

<main>

  <!-- Altitude -->
  <div class="field" style="margin-bottom:10px;">
    <label>Altitude (ft MSL)</label>
    <div class="alt-display" id="altDisplay">5,000 <span>ft</span></div>
    <input type="range" id="altSlider" min="0" max="17000" step="500" value="5000">
  </div>

  <!-- Power % and RPM -->
  <div class="grid-2">
    <div class="field">
      <label>Power %</label>
      <div class="select-wrap">
        <select id="powerPct">
          <option value="45">45%</option>
          <option value="55">55%</option>
          <option value="65" selected>65%</option>
          <option value="75">75%</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>RPM</label>
      <div class="select-wrap">
        <select id="rpm">
          <option value="1800">1800</option>
          <option value="2000">2000</option>
          <option value="2200" selected>2200</option>
          <option value="2400">2400</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Mixture -->
  <div class="field" style="margin-bottom:10px;">
    <label>Mixture</label>
    <div class="select-wrap">
      <select id="mixture">
        <option value="economy" selected>Best Economy (LOP)</option>
        <option value="power">Best Power (ROP)</option>
      </select>
    </div>
  </div>

  <!-- Temp correction -->
  <div class="field" style="margin-bottom: 6px;"><label>Temperature Deviation from ISA</label></div>
  <div class="temp-stepper">
    <button class="temp-step-btn" onclick="stepTemp(-1)">−</button>
    <div class="temp-display">
      <span class="temp-val" id="tempVal">STD</span>
      <span class="temp-sub" id="tempSub">ISA · no correction</span>
    </div>
    <button class="temp-step-btn" onclick="stepTemp(1)">+</button>
  </div>

  <div class="divider"></div>

  <!-- Results -->
  <div class="result-header">◈ POWER SETTINGS</div>
  <div id="results"></div>

</main>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const TABLE = {
  45: {
    1800: { 0:22.7, 1000:22.4, 2000:22.1, 3000:21.8, 4000:21.5, 5000:21.2, 6000:20.9, 7000:20.5, 8000:20.2, 9000:19.9, 10000:19.6, 11000:19.3 },
    2000: { 0:21.3, 1000:21.0, 2000:20.7, 3000:20.4, 4000:20.2, 5000:19.9, 6000:19.6, 7000:19.3, 8000:19.0, 9000:18.7, 10000:18.4, 11000:18.2, 12000:17.9, 13000:17.6, 14000:null },
    2200: { 0:20.2, 1000:19.9, 2000:19.6, 3000:19.3, 4000:19.0, 5000:18.7, 6000:18.4, 7000:18.2, 8000:17.9, 9000:17.6, 10000:17.3, 11000:17.0, 12000:16.7, 13000:16.4, 14000:16.1, 15000:15.8, 16000:15.5 },
    2400: { 0:19.0, 1000:18.7, 2000:18.4, 3000:18.2, 4000:17.9, 5000:17.6, 6000:17.4, 7000:17.1, 8000:16.9, 9000:16.6, 10000:16.3, 11000:16.1, 12000:15.8, 13000:15.5, 14000:15.3, 15000:15.0, 16000:14.7, 17000:14.5 }
  },
  55: {
    2000: { 0:23.9, 1000:23.6, 2000:23.3, 3000:23.0, 4000:22.7, 5000:22.3, 6000:22.0, 7000:21.7, 8000:21.3, 9000:21.1, 10000:null },
    2200: { 0:22.4, 1000:22.2, 2000:21.9, 3000:21.6, 4000:21.2, 5000:20.9, 6000:20.6, 7000:20.3, 8000:20.0, 9000:19.7, 10000:19.4, 11000:19.1, 12000:null },
    2400: { 0:21.2, 1000:21.0, 2000:20.7, 3000:20.4, 4000:20.1, 5000:19.8, 6000:19.5, 7000:19.3, 8000:19.0, 9000:18.7, 10000:18.4, 11000:18.1, 12000:17.8, 13000:17.6, 14000:null }
  },
  65: {
    2000: { 0:26.8, 1000:26.4, 2000:26.0, 3000:25.7, 4000:25.4, 5000:null },
    2200: { 0:24.9, 1000:24.5, 2000:24.2, 3000:23.8, 4000:23.5, 5000:23.1, 6000:22.8, 7000:22.4, 8000:null },
    2400: { 0:23.4, 1000:23.2, 2000:22.9, 3000:22.6, 4000:22.3, 5000:22.0, 6000:21.7, 7000:21.4, 8000:21.0, 9000:20.7, 10000:null }
  },
  75: {
    2200: { 0:27.3, 1000:26.8, 2000:26.5, 3000:26.1, 4000:null },
    2400: { 0:25.8, 1000:25.5, 2000:25.2, 3000:24.8, 4000:24.5, 5000:24.1, 6000:null }
  }
};

// Recommended RPM per power setting (grey-shaded column in AFM)
// The AFM shades the entire recommended RPM column grey for each power %
const REC_RPM = {
  45: 1800,
  55: 2000,
  65: 2200,
  75: 2400
};

const FUEL_FLOW_DETAIL = {
  45: {
    economy: { 1800:5.8, 2000:6.0, 2200:6.3, 2400:6.6 },
    power:   { 1800:null, 2000:null, 2200:7.3, 2400:7.7 }
  },
  55: {
    economy: { 2000:7.0, 2200:7.2, 2400:7.5 },
    power:   { 2000:null, 2200:8.5, 2400:8.7 }
  },
  65: {
    economy: { 2000:7.9, 2200:8.2, 2400:8.5 },
    power:   { 2000:null, 2200:9.5, 2400:9.8 }
  },
  75: {
    economy: { 2200:9.2, 2400:9.5 },
    power:   { 2200:10.7, 2400:11.0 }
  }
};

// ── STATE ─────────────────────────────────────────────────────────────────
let state = { alt: 5000, power: 65, rpm: 2200, mixture: 'economy', temp: 0 };

// Temp steps: -15, -7, 0, +7, +15
const TEMP_STEPS = [-15, -7, 0, 7, 15];
let tempIdx = 2; // start at 0 (STD)

// ── INTERPOLATION ─────────────────────────────────────────────────────────
function getMP(power, rpm, alt) {
  const rpmData = TABLE[power]?.[rpm];
  if (!rpmData) return null;
  const alts = Object.keys(rpmData).map(Number).sort((a,b)=>a-b);
  if (rpmData[alt] !== undefined) return rpmData[alt];
  let lo = null, hi = null;
  for (let i = 0; i < alts.length - 1; i++) {
    if (alts[i] <= alt && alt <= alts[i+1]) { lo = alts[i]; hi = alts[i+1]; }
  }
  if (lo === null) return null;
  const mpLo = rpmData[lo], mpHi = rpmData[hi];
  if (mpLo === null || mpHi === null) return null;
  return mpLo + ((alt - lo) / (hi - lo)) * (mpHi - mpLo);
}

function isRecommended(power, rpm) {
  return REC_RPM[power] === rpm;
}

function getFuelFlow(power, rpm, mixture) {
  return FUEL_FLOW_DETAIL[power]?.[mixture]?.[rpm] ?? null;
}

// ── TEMP STEPPER ──────────────────────────────────────────────────────────
function stepTemp(dir) {
  tempIdx = Math.max(0, Math.min(TEMP_STEPS.length - 1, tempIdx + dir));
  state.temp = TEMP_STEPS[tempIdx];
  updateTempDisplay();
  render();
}

function updateTempDisplay() {
  const t = state.temp;
  const valEl = document.getElementById('tempVal');
  const subEl = document.getElementById('tempSub');

  if (t === 0) {
    valEl.textContent = 'STD';
    valEl.className = 'temp-val neutral';
    subEl.textContent = 'ISA · no correction';
  } else if (t > 0) {
    valEl.textContent = `+${t}°C`;
    valEl.className = 'temp-val';
    const fahr = Math.round(t * 1.8);
    const pct = Math.round((t / 15) * 3);
    subEl.textContent = `ISA+${fahr}°F · −${pct}% power`;
  } else {
    valEl.textContent = `${t}°C`;
    valEl.className = 'temp-val cold';
    const fahr = Math.round(Math.abs(t) * 1.8);
    const pct = Math.round((Math.abs(t) / 15) * 3);
    subEl.textContent = `ISA−${fahr}°F · +${pct}% power`;
  }
}

// ── EVENT LISTENERS ───────────────────────────────────────────────────────
document.getElementById('altSlider').addEventListener('input', e => {
  state.alt = parseInt(e.target.value);
  document.getElementById('altDisplay').innerHTML = Number(state.alt).toLocaleString() + ' <span>ft</span>';
  render();
});

document.getElementById('powerPct').addEventListener('change', e => {
  state.power = parseInt(e.target.value);
  updateRPMOptions();
  render();
});

document.getElementById('rpm').addEventListener('change', e => {
  state.rpm = parseInt(e.target.value);
  render();
});

document.getElementById('mixture').addEventListener('change', e => {
  state.mixture = e.target.value;
  render();
});

function updateRPMOptions() {
  const available = TABLE[state.power] ? Object.keys(TABLE[state.power]).map(Number) : [];
  const sel = document.getElementById('rpm');
  Array.from(sel.options).forEach(opt => {
    opt.disabled = !available.includes(parseInt(opt.value));
  });
  if (!available.includes(state.rpm)) {
    state.rpm = available[0] || 2200;
    sel.value = state.rpm;
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  const { alt, power, rpm, mixture, temp } = state;
  const el = document.getElementById('results');

  let mp = getMP(power, rpm, alt);
  const ff = getFuelFlow(power, rpm, mixture);
  const isInterp = mp !== null && TABLE[power]?.[rpm]?.[alt] === undefined;

  // Temperature correction — AFM: ±15°C = ±3%, so scale linearly
  let mpCorrected = mp;
  let tempNote = '';
  if (mp !== null && temp !== 0) {
    const corrFactor = (-temp / 15) * 0.03;
    mpCorrected = mp * (1 + corrFactor);
    const sign = temp > 0 ? '−' : '+';
    const pct = Math.round((Math.abs(temp) / 15) * 3);
    tempNote = `${sign}${pct}% power correction applied`;
  }

  if (mp === null) {
    el.innerHTML = `<div class="no-data">◯ &nbsp; NO DATA FOR THIS COMBINATION<br><br>
      <span style="font-size:11px">Try a lower altitude or different RPM</span></div>`;
    return;
  }

  const mpStr = mpCorrected.toFixed(1);
  const rec = isRecommended(power, rpm);
  const recRpm = REC_RPM[power];

  let recBadge = '';
  if (rec) {
    recBadge = `<div class="rec-badge recommended">RECOMMENDED SETTING</div>`;
  } else {
    recBadge = `<div class="rec-badge not-recommended">NOT RECOMMENDED · AFM suggests ${recRpm} RPM at ${power}%</div>`;
  }

  // Range calc
  let rangeHtml = '';
  if (ff) {
    const tas = estimateTAS(power, alt);
    const endurance = 42 / ff;
    const range = Math.round(tas * endurance);
    rangeHtml = `<div class="result-card" style="padding: 10px 14px;">
      <div class="result-label">RANGE ESTIMATE</div>
      <div class="result-sub" style="font-size:14px;color:var(--text);">~${Math.round(endurance*10)/10}h endurance · ~${range} nm @ ${tas} kt TAS (est)</div>
      <div class="result-sub" style="margin-top:4px;font-size:11px;">Based on 42 USG usable · ±10% accuracy</div>
    </div>`;
  }

  const mixtureLabel = mixture === 'economy' ? 'Best Economy (LOP)' : 'Best Power (ROP)';

  el.innerHTML = `
    <div class="result-card">
      <div class="result-label">MANIFOLD PRESSURE ${isInterp ? '<span class="interp-badge">INTERPOLATED</span>' : ''}</div>
      <div class="result-value">${mpStr}<span class="unit">inHg</span></div>
      ${recBadge}
      ${tempNote ? `<div class="result-sub" style="margin-top:6px;">⟳ ${tempNote}</div>` : ''}
    </div>

    <div class="result-grid">
      <div class="result-small">
        <div class="result-label">FUEL FLOW</div>
        ${ff !== null
          ? `<div class="result-value">${ff.toFixed(1)}<span class="unit">gal/h</span></div>`
          : `<div class="result-value" style="color:var(--muted)">N/A</div>`
        }
        <div class="result-sub">${mixtureLabel}</div>
      </div>
      <div class="result-small">
        <div class="result-label">POWER</div>
        <div class="result-value">${power}<span class="unit">%</span></div>
        <div class="result-sub">${rpm} RPM</div>
      </div>
    </div>

    ${rangeHtml}

    <div class="note">
      ISA ${alt === 0 ? 'MSL' : alt.toLocaleString() + ' ft'} · ${getISAtemp(alt)}°C std · ${power}% BHP<br>
      AFM Table 5-6/5-7 · Verify against actual POH before flight
    </div>
  `;
}

function getISAtemp(alt) { return Math.round(15 - (alt / 1000) * 1.98); }

function estimateTAS(power, alt) {
  const base = { 45: 104, 55: 113, 65: 120, 75: 128 };
  return Math.round((base[power] || 120) + (alt / 1000) * 2);
}

// Init
updateRPMOptions();
updateTempDisplay();
render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>DA40 Power</title>
<link rel="manifest" href="manifest.json">
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

:root {
  --bg:#080808; --panel:#0f0f0f; --border:#1c1c1c;
  --amber:#ffb400; --amber-dim:#7a5600;
  --text:#e8d5a0; --muted:#5a5040; --heading:#ffffff;
}
[data-theme="light"] {
  --bg:#f5f0e8; --panel:#ffffff; --border:#d8ceb8;
  --amber:#c47f00; --amber-dim:#a06800;
  --text:#2a1f00; --muted:#8a7a5a; --heading:#0a0800;
}

body{background:var(--bg);color:var(--text);font-family:'Oswald',sans-serif;min-height:100vh;
  padding:env(safe-area-inset-top,20px) 18px env(safe-area-inset-bottom,20px);transition:background 0.2s,color 0.2s;}
header{padding:24px 0 8px;border-bottom:1px solid var(--border);margin-bottom:32px;
  display:flex;align-items:flex-end;justify-content:space-between;}
.header-left{}
.logo{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.15em;}
.logo span{color:var(--amber);}
h1{font-size:32px;font-weight:700;letter-spacing:0.08em;color:var(--heading);margin-top:6px;text-transform:uppercase;}
.sub{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:0.1em;}
.theme-btn{background:transparent;border:1px solid var(--border);color:var(--muted);
  font-size:18px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;margin-bottom:4px;}
.theme-btn:active{border-color:var(--amber);}
.card{display:block;background:var(--panel);border:1.5px solid var(--border);padding:24px 20px;
  margin-bottom:14px;text-decoration:none;color:inherit;position:relative;overflow:hidden;transition:border-color 0.15s;}
.card:active{border-color:var(--amber);background:rgba(196,127,0,0.04);}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--amber);}
.card-title{font-size:24px;font-weight:700;letter-spacing:0.06em;color:var(--heading);text-transform:uppercase;}
.card-desc{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);margin-top:8px;
  letter-spacing:0.06em;line-height:1.6;}
.card-arrow{position:absolute;right:20px;top:50%;transform:translateY(-50%);
  font-size:20px;color:var(--amber-dim);}
.badge{display:inline-block;font-family:'Share Tech Mono',monospace;font-size:9px;
  color:var(--amber);border:1px solid rgba(196,127,0,0.3);padding:2px 6px;
  letter-spacing:0.1em;margin-top:8px;}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo">DA40 · <span>IO-360</span> · AFM 5-6/5-7</div>
    <h1>Power Settings</h1>
    <div class="sub">SELECT A MODE</div>
  </div>
  <button class="theme-btn" onclick="toggleTheme()" id="themeBtn" aria-label="Toggle theme">☀️</button>
</header>

<a class="card" href="da40-wizard.html">
  <div class="card-title">Wizard</div>
  <div class="card-desc">STEP-BY-STEP · LARGE BUTTONS<br>BEST FOR USE IN FLIGHT</div>
  <div class="badge">RECOMMENDED</div>
  <div class="card-arrow">→</div>
</a>

<a class="card" href="da40-power.html">
  <div class="card-title">Full Panel</div>
  <div class="card-desc">ALL INPUTS ON ONE SCREEN<br>BEST FOR PREFLIGHT PLANNING</div>
  <div class="card-arrow">→</div>
</a>

<script>
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t === 'light' ? '🌙' : '☀️';
  try { localStorage.setItem('da40-theme', t); } catch(e){}
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
}
try { applyTheme(localStorage.getItem('da40-theme') || 'dark'); } catch(e) { applyTheme('dark'); }
</script>
</body>
</html>
